name: notely_app
description: "Una aplicación multiplataforma de notas tipo Notion con sincronización en tiempo real."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado y gestión
  provider: ^6.0.0

  # Navegación
  go_router: ^13.0.0

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.10.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting y análisis
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets (si hay imágenes en el futuro)
  # assets:
  #   - assets/

  # Fonts (si hay fuentes personalizadas)
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: assets/fonts/Schyler-Regular.ttf
  #       - asset: assets/fonts/Schyler-Italic.ttf
  #         style: italic
